server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://192.168.85.66:3306/refund_agent?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: false  # 暂时关闭，等表设计后再开启
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: 192.168.85.66
      port: 6379

jwt:
  secret: ${JWT_SECRET:your-secret-key-here-change-in-production}
  expiration: 86400000

logging:
  level:
    com.example.aftersale: DEBUG
    org.springframework.security: WARN