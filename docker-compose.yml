version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: refund-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: refund_agent
      MYSQL_USER: refund_user
      MYSQL_PASSWORD: refund_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ../docker/mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - refund-network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: refund-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - refund-network

  # Elasticsearch
  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: refund-elasticsearch
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - refund-network

  # Java Service
  java-service:
    build:
      context: ./java-service
      dockerfile: Dockerfile
    container_name: refund-java-service
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/refund_agent?useSSL=false&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=refund_user
      - SPRING_DATASOURCE_PASSWORD=refund_pass
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - refund-network

  # Python Agent
  python-agent:
    build:
      context: ./python-agent
      dockerfile: Dockerfile
    container_name: refund-python-agent
    ports:
      - "8000:8000"
    environment:
      - JAVA_API_URL=http://java-service:8080
      - REDIS_URL=redis://redis:6379/0
      - ELASTICSEARCH_URL=http://elasticsearch:9200
    depends_on:
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      java-service:
        condition: service_started
    networks:
      - refund-network

volumes:
  mysql-data:
  redis-data:
  es-data:

networks:
  refund-network:
    driver: bridge
